name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows 构建 (videoview)
    runs-on: windows-latest
    steps:
      - name: 确定版本号
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
              $ver = '${{ github.ref_name }}'
          } else {
              $ver = 'manual'
          }
          Write-Host "VERSION=${ver}"
          "VERSION=${ver}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=${ver}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装 VLC 便携版（供打包用）
        shell: pwsh
        run: |
          $VLC_VERSION = "3.0.21"
          $url = "https://download.videolan.org/videolan/vlc/${VLC_VERSION}/win64/vlc-${VLC_VERSION}-win64.zip"
          $zip = "$env:TEMP\vlc.zip"
          Write-Host "Downloading VLC ${VLC_VERSION} ..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Write-Host "Extracting VLC ..."
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\vlc-temp" -Force
          $inner = Get-ChildItem "$env:TEMP\vlc-temp" -Directory | Select-Object -First 1
          if ($inner) {
              Move-Item "$($inner.FullName)" "$env:GITHUB_WORKSPACE\vlc" -Force
              Write-Host "VLC installed at $env:GITHUB_WORKSPACE\vlc"
          } else {
              Move-Item "$env:TEMP\vlc-temp" "$env:GITHUB_WORKSPACE\vlc" -Force
              Write-Host "VLC installed at $env:GITHUB_WORKSPACE\vlc (flat)"
          }
          if (-not (Test-Path "$env:GITHUB_WORKSPACE\vlc\libvlc.dll")) {
              Write-Error "libvlc.dll not found in vlc/ directory"
              exit 1
          }
          Write-Host "VLC directory structure OK."
          Get-ChildItem "$env:GITHUB_WORKSPACE\vlc" -Directory | Select-Object Name

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: PyInstaller 打包
        shell: pwsh
        run: |
          python -m PyInstaller videoview.spec --clean --noconfirm

      - name: 校验产物
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\videoview\videoview.exe")) {
              Write-Error "videoview.exe 未生成！"
              exit 1
          }
          Write-Host "videoview.exe 存在"
          Get-ChildItem "dist\videoview" | Select-Object Name, Length | Select-Object -First 30

      - name: 生成 zip 压缩包
        shell: pwsh
        run: |
          $version = "$env:VERSION"
          $zipName = "videoview-windows-${version}.zip"
          Compress-Archive -Path "dist\videoview\*" -DestinationPath $zipName -Force
          Write-Host "打包完成：${zipName}"
          (Get-Item $zipName).Length
          Write-Host "ZIP_NAME=${zipName}"
          "ZIP_NAME=${zipName}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 上传 Windows 产物（供 release job 使用）
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-asset
          path: videoview-windows-*.zip

  build-linux:
    name: Linux 构建 (videoview)
    runs-on: ubuntu-latest
    steps:
      - name: 确定版本号
        id: version
        run: |
          if [ '${{ github.event_name }}' = 'push' ]; then
              VERSION='${{ github.ref_name }}'
          else
              VERSION='manual'
          fi
          echo "VERSION=${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装系统依赖（VLC + Qt 运行库）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              libvlc-dev libvlccore-dev vlc-bin vlc-data \
              libxcb-xinerama0 libxkbcommon0 libgl1 libegl1 \
              libopengl0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
              libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
              libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
              libxkbcommon-x11-0 libdbus-1-3 libfontconfig1 libfreetype6 \
              libglx0 libglvnd0 libx11-xcb1 libxcb-glx0 libxcb-dri2-0 \
              libxcb-dri3-0 libxcb-present0 libxcb-shm0 \
              libegl-mesa0 libglx-mesa0 mesa-utils \
              xvfb xauth upx-ucl
          echo "系统依赖已安装"
          which vlc
          vlc --version | head -n 3
          ldconfig -p | grep libvlc | head -n 5

      - name: 把系统 VLC 提取到项目 vlc/ 目录（保证跨机器可运行）
        run: |
          VLC_LIB_DIR=$(dirname $(ldconfig -p | grep "libvlc\.so\." | head -n 1 | awk '{print $NF}'))
          echo "VLC lib dir: ${VLC_LIB_DIR}"
          if [ -z "$VLC_LIB_DIR" ] || [ ! -d "$VLC_LIB_DIR" ]; then
              VLC_LIB_DIR="/usr/lib/x86_64-linux-gnu"
          fi
          PLUGIN_DIR=$(find /usr -type d -name "plugins" -path "*vlc*" 2>/dev/null | head -n 1)
          echo "VLC plugin dir: ${PLUGIN_DIR}"

          mkdir -p "$GITHUB_WORKSPACE/vlc/lib"
          mkdir -p "$GITHUB_WORKSPACE/vlc/plugins"

          for lib in libvlc.so libvlccore.so libvlc.so.* libvlccore.so.*; do
              find "$VLC_LIB_DIR" -maxdepth 2 -name "$lib" -exec cp -f {} "$GITHUB_WORKSPACE/vlc/lib/" \; 2>/dev/null || true
          done
          if [ -n "$PLUGIN_DIR" ] && [ -d "$PLUGIN_DIR" ]; then
              cp -r "$PLUGIN_DIR"/* "$GITHUB_WORKSPACE/vlc/plugins/" 2>/dev/null || true
          fi
          for dep in libvlc libvlccore libavcodec libavformat libavutil libswscale \
                     libasound libpulse libsamplerate libsndfile libfreetype \
                     libfontconfig libharfbuzz libegl libGL libGLX libxcb \
                     libxkbcommon libdbus-1 libcap librt libnsl libtirpc; do
              find "$VLC_LIB_DIR" -maxdepth 2 -name "${dep}.so*" -exec cp -f {} "$GITHUB_WORKSPACE/vlc/lib/" \; 2>/dev/null || true
          done
          if [ -f "$PLUGIN_DIR/../plugins.dat" ]; then
              cp "$PLUGIN_DIR/../plugins.dat" "$GITHUB_WORKSPACE/vlc/lib/" 2>/dev/null || true
          fi
          ls -la "$GITHUB_WORKSPACE/vlc/lib/" | head -n 20
          echo "---"
          ls -la "$GITHUB_WORKSPACE/vlc/plugins/" | head -n 20

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: PyInstaller 打包
        run: |
          python -m PyInstaller videoview.spec --clean --noconfirm

      - name: 校验产物
        run: |
          if [ ! -f "dist/videoview/videoview" ]; then
              echo "ERROR: videoview 可执行文件未生成"
              ls -la dist/
              exit 1
          fi
          chmod +x dist/videoview/videoview
          ls -la dist/videoview/ | head -n 30

      - name: 生成 tar.gz 压缩包
        run: |
          VERSION="$VERSION"
          TAR_NAME="videoview-linux-${VERSION}.tar.gz"
          tar -czf "$TAR_NAME" -C dist/videoview .
          echo "打包完成：${TAR_NAME}"
          ls -lh "$TAR_NAME"
          echo "TAR_NAME=${TAR_NAME}" >> $GITHUB_ENV

      - name: 上传 Linux 产物（供 release job 使用）
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-asset
          path: videoview-linux-*.tar.gz

  create-release:
    name: 创建 Release 并上传产物
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: 下载 Windows 产物
        uses: actions/download-artifact@v4
        with:
          name: windows-release-asset

      - name: 下载 Linux 产物
        uses: actions/download-artifact@v4
        with:
          name: linux-release-asset

      - name: 列出产物文件
        run: |
          ls -la
          echo "---"
          echo "Tag: ${{ github.ref_name }}"
          echo "Windows zip:" $(ls videoview-windows-*.zip 2>/dev/null)
          echo "Linux tar:" $(ls videoview-linux-*.tar.gz 2>/dev/null)

      - name: 创建 Release 并上传所有产物
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VideoView ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            videoview-windows-${{ github.ref_name }}.zip
            videoview-linux-${{ github.ref_name }}.tar.gz
